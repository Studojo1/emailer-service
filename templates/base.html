<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studojo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #171717;
            line-height: 1.6;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .email-header {
            background-color: #8b5cf6;
            padding: 32px 24px;
            text-align: center;
        }
        .email-header h1 {
            margin: 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .email-body {
            padding: 40px 24px;
        }
        .email-body h2 {
            margin: 0 0 16px 0;
            color: #171717;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
        }
        .email-body p {
            margin: 0 0 16px 0;
            color: #525252;
            font-size: 16px;
            line-height: 1.6;
        }
        .email-body p:last-child {
            margin-bottom: 0;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #8b5cf6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 16px;
            text-align: center;
            border: 2px solid #171717;
            box-shadow: 4px 4px 0px 0px rgba(25, 26, 35, 1);
            margin: 24px 0;
        }
        .button:hover {
            box-shadow: 2px 2px 0px 0px rgba(25, 26, 35, 1);
            transform: translate(2px, 2px);
        }
        .email-footer {
            padding: 32px 24px;
            background-color: #f5f5f5;
            text-align: center;
            border-top: 1px solid #e5e5e5;
        }
        .email-footer p {
            margin: 0 0 8px 0;
            color: #525252;
            font-size: 14px;
        }
        .email-footer a {
            color: #8b5cf6;
            text-decoration: none;
        }
        .email-footer a:hover {
            text-decoration: underline;
        }
        @media only screen and (max-width: 600px) {
            .email-body {
                padding: 32px 20px;
            }
            .email-header {
                padding: 24px 20px;
            }
            .email-header h1 {
                font-size: 20px;
            }
            .email-body h2 {
                font-size: 18px;
            }
            .button {
                display: block;
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>Studojo</h1>
        </div>
        <div class="email-body">
            {{block "content" .}}{{end}}
        </div>
        <div class="email-footer">
            <p>© 2024 Studojo. All rights reserved.</p>
            <p><a href="https://studojo.com/support">Need help? Contact support</a></p>
        </div>
    </div>
</body>
</html>
