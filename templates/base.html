<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studojo</title>
    <!--[if mso]>
    <noscript>
    <xml>
    <o:OfficeDocumentSettings>
    <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
    </xml>
    </noscript>
    <![endif]-->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #171717;
            line-height: 1.6;
            -webkit-text-size-adjust: 100%;
        }
        .wrapper {
            width: 100%;
            background-color: #f5f5f5;
            padding: 32px 0;
        }
        .email-container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #171717;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 6px 6px 0px 0px rgba(25, 26, 35, 1);
        }
        .email-header {
            background-color: #7c3aed;
            padding: 28px 32px;
            text-align: left;
        }
        .email-header-logo {
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
        }
        .email-header-tagline {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 400;
        }
        .email-body {
            padding: 36px 32px;
            text-align: left;
        }
        .greeting {
            font-size: 22px;
            font-weight: 700;
            color: #171717;
            margin: 0 0 20px 0;
            letter-spacing: -0.3px;
        }
        .email-body p {
            margin: 0 0 16px 0;
            color: #404040;
            font-size: 15px;
            line-height: 1.7;
        }
        .highlight-box {
            background-color: #f5f3ff;
            border: 2px solid #7c3aed;
            border-radius: 12px;
            padding: 20px 24px;
            margin: 24px 0;
        }
        .highlight-box p {
            color: #4c1d95;
            margin: 0;
            font-weight: 500;
            font-size: 15px;
        }
        .stat-row {
            display: flex;
            margin: 24px 0;
        }
        .stat-box {
            background-color: #fafafa;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            padding: 16px 20px;
            margin: 0 8px 0 0;
            text-align: center;
            flex: 1;
        }
        .stat-box:last-child {
            margin-right: 0;
        }
        .stat-number {
            font-size: 24px;
            font-weight: 800;
            color: #7c3aed;
            display: block;
        }
        .stat-label {
            font-size: 12px;
            color: #737373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }
        .feature-card {
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
            margin: 12px 0;
            display: flex;
            align-items: flex-start;
        }
        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .feature-icon-purple { background-color: #f5f3ff; }
        .feature-icon-green { background-color: #f0fdf4; }
        .feature-icon-blue { background-color: #eff6ff; }
        .feature-icon-amber { background-color: #fffbeb; }
        .feature-text h3 {
            margin: 0 0 4px 0;
            font-size: 15px;
            font-weight: 700;
            color: #171717;
        }
        .feature-text p {
            margin: 0;
            font-size: 13px;
            color: #737373;
            line-height: 1.5;
        }
        .steps-list {
            counter-reset: step;
            list-style: none;
            padding: 0;
            margin: 24px 0;
        }
        .steps-list li {
            counter-increment: step;
            position: relative;
            padding: 12px 0 12px 48px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 15px;
            color: #404040;
        }
        .steps-list li:last-child { border-bottom: none; }
        .steps-list li::before {
            content: counter(step);
            position: absolute;
            left: 0;
            top: 10px;
            width: 32px;
            height: 32px;
            background-color: #7c3aed;
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-size: 14px;
            font-weight: 700;
        }
        .quote-block {
            border-left: 4px solid #7c3aed;
            padding: 16px 20px;
            margin: 24px 0;
            background-color: #fafafa;
            border-radius: 0 12px 12px 0;
        }
        .quote-block p {
            margin: 0;
            font-style: italic;
            color: #404040;
            font-size: 15px;
        }
        .quote-block .attribution {
            font-style: normal;
            font-size: 13px;
            color: #737373;
            margin-top: 8px;
            font-weight: 600;
        }
        .btn-primary {
            display: inline-block;
            padding: 14px 32px;
            background-color: #7c3aed;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            border: 2px solid #171717;
            box-shadow: 4px 4px 0px 0px rgba(25, 26, 35, 1);
            margin: 24px 0;
            letter-spacing: 0.2px;
        }
        .btn-secondary {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ffffff;
            color: #171717 !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            border: 2px solid #171717;
            box-shadow: 3px 3px 0px 0px rgba(25, 26, 35, 1);
            margin: 8px 8px 8px 0;
        }
        .divider {
            height: 2px;
            background-color: #f5f5f5;
            border: none;
            margin: 28px 0;
        }
        .signature {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        .signature p {
            font-size: 14px;
            color: #737373;
            margin: 0;
        }
        .signature .name {
            font-weight: 700;
            color: #171717;
            font-size: 15px;
        }
        .email-footer {
            padding: 24px 32px;
            background-color: #fafafa;
            text-align: center;
            border-top: 2px solid #f0f0f0;
        }
        .email-footer p {
            margin: 0 0 6px 0;
            color: #a3a3a3;
            font-size: 12px;
        }
        .email-footer a {
            color: #7c3aed;
            text-decoration: none;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .badge-purple { background-color: #f5f3ff; color: #7c3aed; }
        .badge-green { background-color: #f0fdf4; color: #16a34a; }
        @media only screen and (max-width: 600px) {
            .wrapper { padding: 16px 12px; }
            .email-container { border-radius: 12px; box-shadow: 4px 4px 0px 0px rgba(25,26,35,1); }
            .email-body { padding: 28px 20px; }
            .email-header { padding: 24px 20px; }
            .greeting { font-size: 20px; }
            .btn-primary { display: block; text-align: center; }
            .stat-row { flex-direction: column; }
            .stat-box { margin: 0 0 8px 0; }
            .feature-card { flex-direction: column; }
            .feature-icon { margin: 0 0 12px 0; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
    <div class="email-container">
        <div class="email-header">
            <a href="https://studojo.com" class="email-header-logo" style="color:#ffffff;text-decoration:none;">Studojo</a>
            <div class="email-header-tagline">Work on things that matter.</div>
        </div>
        <div class="email-body">
            {{block "content" .}}{{end}}
        </div>
        <div class="email-footer">
            <p style="margin-bottom:12px;"><a href="https://studojo.com">studojo.com</a></p>
            <p>&copy; 2026 Studojo &middot; Bangalore, India</p>
            <p style="margin-top:8px;"><a href="https://studojo.com/support">Help</a> &middot; <a href="mailto:admin@studojo.com">Reply to us</a></p>
        </div>
    </div>
    </div>
</body>
</html>
