name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io
  ACR_NAME: acrstudojo
  SERVICE_NAME: emailer-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          TOKEN=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --output tsv --query accessToken)
          docker login ${{ env.REGISTRY }} -u 00000000-0000-0000-0000-000000000000 -p "$TOKEN"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Patch Kubernetes secrets
        run: |
          kubectl patch secret app-secrets -n studojo -p "{\"stringData\":{\"resend-api-key\":\"${{ secrets.RESEND_API_KEY }}\"}}"

      - name: Ensure RESEND_API_KEY in deployment env
        run: |
          kubectl set env deployment/${{ env.SERVICE_NAME }} -n studojo \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            AZURE_EMAIL_SENDER_ADDRESS="onboarding@resend.dev"

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} ${{ env.SERVICE_NAME }}=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} -n studojo
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n studojo --timeout=10m || {
            echo "Rollout failed or timed out. Checking pod status..."
            kubectl get pods -n studojo -l app=${{ env.SERVICE_NAME }} -o wide
            echo ""
            PODS=$(kubectl get pods -n studojo -l app=${{ env.SERVICE_NAME }} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[*].metadata.name}')
            for POD in $PODS; do
              echo "=== Logs for $POD ==="
              kubectl logs -n studojo $POD --tail=80 2>&1 || true
              echo "=== Previous logs for $POD ==="
              kubectl logs -n studojo $POD --previous --tail=80 2>&1 || true
              echo "=== Events for $POD ==="
              kubectl get events -n studojo --field-selector involvedObject.name=$POD --sort-by='.lastTimestamp' 2>&1 | tail -10 || true
            done
            exit 1
          }

      - name: Record deployment
        run: |
          curl -X POST https://api.studojo.com/v1/dev/deployments \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Secret: ${{ secrets.DEPLOYMENT_SECRET }}" \
            -d '{
              "service": "${{ env.SERVICE_NAME }}",
              "version": "${{ env.IMAGE_TAG }}",
              "deployed_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
              "deployed_by": "${{ github.actor }}",
              "status": "success",
              "workflow_run": ${{ github.run_id }}
            }' || echo "Failed to record deployment (non-critical)"
