name: Emailer Service CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'services/emailer-service/**'
      - '.github/workflows/service-ci-cd.yml'
  tags:
    - 'v*.*.*'

jobs:
  build-and-deploy:
    uses: ./.github/workflows/service-ci-cd.yml@main
    with:
      service_name: emailer-service
      service_path: ./services/emailer-service
      k8s_deployment_name: emailer-service
      k8s_container_name: emailer-service
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      DEV_PANEL_WEBHOOK_URL: ${{ secrets.DEV_PANEL_WEBHOOK_URL }}

