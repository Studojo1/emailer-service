name: Webinar Join Link

# Sends the webinar join link to every registrant, but ONLY when the webinar is
# exactly one day away (the endpoint compares the admin-set webinar_date to
# tomorrow and no-ops otherwise). Idempotent: webinar_link_sent dedups, so a
# registrant never gets the link twice. Safe to run daily.
on:
  schedule:
    - cron: "30 4 * * *"    # 10:00 IST daily (before the re-engage cron)
  workflow_dispatch:         # allow manual runs
    inputs:
      force:
        description: "Bypass the one-day-before date gate (one-off re-send on the webinar day itself). Dedup still applies; only registrants not yet emailed are sent."
        type: boolean
        default: false

jobs:
  webinar-link:
    runs-on: ubuntu-latest
    steps:
      - name: Send webinar join link if it's one day before
        run: |
          URL="https://email.studojo.com/v1/email/webinar-link-cron"
          if [ "${{ inputs.force }}" = "true" ]; then URL="$URL?force=true"; fi
          echo "POST $URL"
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            "$URL" \
            -H "X-Internal-Secret: ${{ secrets.INTERNAL_SECRET }}")
          echo "HTTP $code"; cat /tmp/out.json || true
          # The endpoint now sends in the background and returns 202 Accepted
          # immediately (the inline send loop used to 504 on large registrant lists).
          # 200 is still returned for the no-op cases ("not one day before" etc).
          test "$code" = "202" -o "$code" = "200"
